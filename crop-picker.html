<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Crop Picker</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; }
  header { padding: 10px 14px; background: #222; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
  header code { background: #000; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  button { background: #4a9eff; color: #fff; border: 0; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  button:hover { background: #5aaeff; }
  #wrap { position: relative; display: inline-block; margin: 14px; }
  #img { display: block; max-width: calc(100vw - 28px); height: auto; user-select: none; -webkit-user-drag: none; }
  #rect { position: absolute; border: 2px dashed #4a9eff; background: rgba(74, 158, 255, 0.15); pointer-events: none; display: none; }
  .hint { color: #888; font-size: 13px; }
</style>
</head>
<body>
<header>
  <span class="hint">Drag on the image to select a crop region.</span>
  <span>Crop:</span>
  <code id="out">—</code>
  <span>Size:</span>
  <code id="size">—</code>
  <button id="copy">Copy coords</button>
  <button id="reset">Reset</button>
</header>
<div id="wrap">
  <img id="img" src="./public/images/cabu/1.PNG" alt="">
  <div id="rect"></div>
</div>
<script>
  const img = document.getElementById('img');
  const rect = document.getElementById('rect');
  const out = document.getElementById('out');
  const sizeEl = document.getElementById('size');
  let start = null, crop = null;

  function toImgCoords(e) {
    const r = img.getBoundingClientRect();
    const scale = img.naturalWidth / r.width;
    const x = Math.max(0, Math.min(img.naturalWidth,  (e.clientX - r.left) * scale));
    const y = Math.max(0, Math.min(img.naturalHeight, (e.clientY - r.top)  * scale));
    return { x: Math.round(x), y: Math.round(y) };
  }
  function render() {
    if (!crop) { rect.style.display = 'none'; out.textContent = '—'; sizeEl.textContent = '—'; return; }
    const r = img.getBoundingClientRect();
    const scale = r.width / img.naturalWidth;
    const left = Math.min(crop.x1, crop.x2), top = Math.min(crop.y1, crop.y2);
    const right = Math.max(crop.x1, crop.x2), bot = Math.max(crop.y1, crop.y2);
    rect.style.left   = (left  * scale) + 'px';
    rect.style.top    = (top   * scale) + 'px';
    rect.style.width  = ((right - left) * scale) + 'px';
    rect.style.height = ((bot  - top)   * scale) + 'px';
    rect.style.display = 'block';
    out.textContent = `left=${left}, top=${top}, right=${right}, bottom=${bot}`;
    sizeEl.textContent = `${right - left} × ${bot - top}`;
  }

  img.addEventListener('mousedown', e => { e.preventDefault(); start = toImgCoords(e); crop = { x1: start.x, y1: start.y, x2: start.x, y2: start.y }; render(); });
  window.addEventListener('mousemove', e => { if (!start) return; const p = toImgCoords(e); crop.x2 = p.x; crop.y2 = p.y; render(); });
  window.addEventListener('mouseup', () => { start = null; });
  window.addEventListener('resize', render);

  document.getElementById('copy').addEventListener('click', () => {
    if (!crop) return;
    navigator.clipboard.writeText(out.textContent);
  });
  document.getElementById('reset').addEventListener('click', () => { crop = null; render(); });
</script>
</body>
</html>
